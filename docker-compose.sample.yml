services:

  site:
    image: cofacts/rumors-site:latest-en
    env_file:
      - ./env-files/site
    ports:
      - "3000:3000"
    depends_on:
      - api

  api:
    image: cofacts/rumors-api
    env_file:
      - ./env-files/api
    volumes:
      - "./volumes/api:/data"
    ports:
      - "5000:5000"
    depends_on:
      - db
      - url-resolver

  db:
    image: docker.elastic.co/elasticsearch/elasticsearch-oss:6.3.2
    environment:
      - path.repo=/usr/share/elasticsearch/data
    volumes:
      - "./volumes/db-sample:/usr/share/elasticsearch/data"
    ports:
      - "62222:9200"

  url-resolver:
    image: cofacts/url-resolver
    ports: # expose for debugging
      - "4000:4000"
    env_file:
      - ./env-files/url-resolver

  line-bot-zh:
    image: cofacts/rumors-line-bot:dev
    env_file:
      - ./env-files/line-bot-zh
    ports:
      - "5001:5001"
    depends_on:
      - api
      - mongo
      - redis

  redis:
    image: redis

  mongo:
    image: mongo:3.6
    env_file:
      - ./env-files/mongo
    ports:
      - "27017:27017"
    volumes:
      - "./data/mongo:/data/db"
    command: mongod

  # cofacts.ai AI agent backend (ADK)
  adk:
    image: cofacts/adk:latest
    restart: always
    env_file:
      - ./env-files/adk
    environment:
      - PORT=8000
      - LANGFUSE_BASE_URL=https://langfuse.cofacts.tw
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s

  # cofacts.ai website frontend
  cofacts-ai:
    image: cofacts/site:latest
    restart: always
    environment:
      - PORT=3000
      - ADK_URL=http://adk:8000
      - PUBLIC_URL=https://cofacts.ai
    depends_on:
      adk:
        condition: service_healthy
