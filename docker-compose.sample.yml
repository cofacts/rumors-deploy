services:

  site:
    image: cofacts/rumors-site:latest-en
    env_file:
      - ./env-files/site
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy

  api:
    image: cofacts/rumors-api
    env_file:
      - ./env-files/api
    volumes:
      - "./volumes/api:/data"
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
      url-resolver:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "curl -sS http://localhost:5000/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  db:
    image: docker.elastic.co/elasticsearch/elasticsearch-oss:6.3.2
    environment:
      - path.repo=/usr/share/elasticsearch/data
    volumes:
      - "./volumes/db-sample:/usr/share/elasticsearch/data"
    ports:
      - "62222:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -sS http://localhost:9200 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  url-resolver:
    image: cofacts/url-resolver
    ports: # expose for debugging
      - "4000:4000"
    env_file:
      - ./env-files/url-resolver

  line-bot-zh:
    image: cofacts/rumors-line-bot:dev
    env_file:
      - ./env-files/line-bot-zh
    ports:
      - "5001:5001"
    depends_on:
      api:
        condition: service_healthy
      mongo:
        condition: service_started
      redis:
        condition: service_started

  redis:
    image: redis

  mongo:
    image: mongo:3.6
    env_file:
      - ./env-files/mongo
    ports:
      - "27017:27017"
    volumes:
      - "./data/mongo:/data/db"
    command: mongod

  # cofacts.ai AI agent backend (ADK)
  adk:
    image: cofacts/adk:latest
    restart: always
    env_file:
      - ./env-files/adk
    environment:
      - PORT=8000
      - LANGFUSE_BASE_URL=https://langfuse.cofacts.tw
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 60s
      start_interval: 5s
      timeout: 5s
      retries: 6
      start_period: 60s

  # cofacts.ai website frontend
  cofacts-ai:
    image: cofacts/site:latest
    restart: always
    environment:
      - PORT=3000
      - ADK_URL=http://adk:8000
      - PUBLIC_URL=http://localhost:3000
    depends_on:
      adk:
        condition: service_healthy
